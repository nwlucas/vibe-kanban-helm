name: Build & Release

on:
  push:
    tags:
      - "*"
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/vibe-kanban

jobs:
  resolve-tags:
    runs-on: ubuntu-latest
    outputs:
      server_tag: ${{ steps.tags.outputs.server_tag }}
      relay_tag: ${{ steps.tags.outputs.relay_tag }}
      worker_tag: ${{ steps.tags.outputs.worker_tag }}
      vite_relay_url: ${{ steps.tags.outputs.vite_relay_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install yq
        uses: mikefarah/yq@v4

      - name: Read tags from values.yaml
        id: tags
        run: |
          VALUES="helm/vibe-kanban/values.yaml"

          SERVER_TAG=$(yq '.server.image.tag' "$VALUES")
          RELAY_TAG=$(yq '.relay.image.tag' "$VALUES")
          WORKER_TAG=$(yq '.worker.image.tag' "$VALUES")

          echo "server_tag=${SERVER_TAG}" >> "$GITHUB_OUTPUT"
          echo "relay_tag=${RELAY_TAG}"   >> "$GITHUB_OUTPUT"
          echo "worker_tag=${WORKER_TAG}" >> "$GITHUB_OUTPUT"
          echo "vite_relay_url=${{ vars.VITE_RELAY_API_BASE_URL }}" >> "$GITHUB_OUTPUT"

  build-server:
    needs: resolve-tags
    runs-on: ubuntu-latest
    steps:
      - name: Clone upstream vibe-kanban
        run: |
          git clone --branch "${{ needs.resolve-tags.outputs.server_tag }}" --depth 1 \
            https://github.com/BloopAI/vibe-kanban.git /tmp/vibe-kanban

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: /tmp/vibe-kanban
          file: /tmp/vibe-kanban/crates/remote/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VITE_RELAY_API_BASE_URL=${{ needs.resolve-tags.outputs.vite_relay_url }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.resolve-tags.outputs.server_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:server-latest

  build-relay:
    needs: resolve-tags
    runs-on: ubuntu-latest
    steps:
      - name: Clone upstream vibe-kanban
        run: |
          git clone --branch "${{ needs.resolve-tags.outputs.relay_tag }}" --depth 1 \
            https://github.com/BloopAI/vibe-kanban.git /tmp/vibe-kanban

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push relay image
        uses: docker/build-push-action@v6
        with:
          context: /tmp/vibe-kanban
          file: /tmp/vibe-kanban/crates/relay-tunnel/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.resolve-tags.outputs.relay_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:relay-latest

  build-worker:
    needs: resolve-tags
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile-worker
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            WORKER_TAG=${{ needs.resolve-tags.outputs.worker_tag }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:worker-${{ needs.resolve-tags.outputs.worker_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:worker-latest

  release-helm-chart:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Push chart as OCI artifact to GHCR
        run: |
          helm package helm/vibe-kanban --destination .cr-release-packages
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username "${{ github.repository_owner }}" --password-stdin
          helm push .cr-release-packages/*.tgz oci://ghcr.io/${{ github.repository_owner }}/charts
          helm registry logout ghcr.io
