{{- if .Values.worker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vibe-kanban.worker.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vibe-kanban.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.worker.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "vibe-kanban.worker.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
      {{- with .Values.worker.podAnnotations }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "vibe-kanban.worker.selectorLabels" . | nindent 8 }}
        {{- with .Values.worker.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "vibe-kanban.serviceAccountName" . }}
      automountServiceAccountToken: false
      securityContext:
        {{- toYaml .Values.worker.podSecurityContext | nindent 8 }}
      initContainers:
        - name: wait-for-server
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            seccompProfile:
              type: RuntimeDefault
          command:
            - sh
            - -c
            - |
              until nc -z {{ include "vibe-kanban.server.fullname" . }} 8081; do
                echo "waiting for server…"; sleep 3
              done
        {{- if .Values.worker.preStartScript.enabled }}
        - name: setup
          image: "{{ .Values.worker.preStartScript.image | default (printf "%s:%s" .Values.worker.image.repository (.Values.worker.image.tag | default .Chart.AppVersion)) }}"
          imagePullPolicy: {{ .Values.worker.image.pullPolicy }}
          {{- if .Values.worker.preStartScript.runAsRoot }}
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
            allowPrivilegeEscalation: true
            capabilities:
              drop: [ALL]
          {{- else }}
          securityContext:
            {{- toYaml .Values.worker.securityContext | nindent 12 }}
          {{- end }}
          command:
            - sh
            - /scripts/init.sh
          envFrom:
            - secretRef:
                name: {{ include "vibe-kanban.secretName" . }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: home-node
              mountPath: /home/node
            - name: init-script
              mountPath: /scripts
              readOnly: true
        {{- end }}
      containers:
        - name: worker
          image: "{{ .Values.worker.image.repository }}:{{ .Values.worker.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.worker.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.worker.securityContext | nindent 12 }}
          # Inject every key from the credentials secret as an env var.
          envFrom:
            - secretRef:
                name: {{ include "vibe-kanban.secretName" . }}
          env:
            - name: RUST_LOG
              value: {{ .Values.worker.env.RUST_LOG | quote }}
            - name: HOST
              value: {{ .Values.worker.env.HOST | default "0.0.0.0" | quote }}
            - name: PORT
              value: {{ .Values.worker.env.PORT | default "3000" | quote }}
            # Resolve API base URL: use explicit value or fall back to internal server service.
            - name: VK_SHARED_API_BASE
              value: {{ .Values.worker.env.VK_SHARED_API_BASE | default (printf "http://%s:8081" (include "vibe-kanban.server.fullname" .)) | quote }}
            - name: VK_SHARED_RELAY_API_BASE
              value: {{ .Values.worker.env.VK_SHARED_RELAY_API_BASE | default ( printf "http://%s.%s.svc.cluster.local:8082" (include "vibe-kanban.relay.fullname" .) .Release.Namespace ) | quote }}
            - name: VK_TUNNEL
              value: "1"
          ports:
            - name: http
              containerPort: {{ .Values.worker.env.PORT | default "3000" }}
              protocol: TCP
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: home-node
              mountPath: /home/node
      volumes:
        - name: tmp
          emptyDir: {}
        - name: home-node
          {{- if .Values.worker.persistence.homeNode.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "vibe-kanban.worker.fullname" . }}-home-node
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- if .Values.worker.preStartScript.enabled }}
        - name: init-script
          configMap:
            name: {{ include "vibe-kanban.worker.fullname" . }}-init-script
            defaultMode: 0555
        {{- end }}
      {{- with .Values.worker.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.worker.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.worker.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
